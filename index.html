<!DOCTYPE html>
<html>
  <head>
    <title> Todo List </title>
    <link rel = "stylesheet" href="css/To-do_List.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>

  <body>
    <div class="todo-container">
      <div class="todo-section">
        <p> General Tasks To Do </p>

        <div class="todo-input-grid">
          <input placeholder="Todo name" class="js-name-input name-input">
          <input type="date" class="js-due-date-input due-date-input">
          <button class="add-todo-button js-add-todo-button">Add</button>
        </div>

        <div class="js-todo-list todo-grid"></div>
      </div>

      <div class="todo-section">
        <p> Job Tasks To Do </p>

        <div class="todo-input-grid">
          <input placeholder="Todo name" class="js-name-input-2 name-input">
          <input type="date" class="js-due-date-input-2 due-date-input">
          <button class="add-todo-button js-add-todo-button-2">Add</button>
        </div>

        <div class="js-todo-list-2 todo-grid"></div>
      </div>
    </div>

    <script type= 'module' src="js/To-do_List.js"> </script>
  </body>
</html>
